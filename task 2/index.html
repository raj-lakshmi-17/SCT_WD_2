<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Stopwatch</h1>

        <!-- Timer Display -->
        <div class="display">
            <span id="minutes">00</span> :
            <span id="seconds">00</span> .
            <span id="milliseconds">00</span>
        </div>

        <!-- Buttons -->
        <div class="buttons">
            <button id="startBtn" onclick="startStop()">Start</button>
            <button id="lapBtn" onclick="recordLap()" disabled>Lap</button>
            <button id="resetBtn" onclick="resetTimer()">Reset</button>
        </div>

        <!-- Lap Times -->
        <div class="laps">
            <h3>Lap Times</h3>
            <ul id="lapList"></ul>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
